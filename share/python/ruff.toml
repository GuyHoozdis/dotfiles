# 1. Review https://docs.astral.sh/ruff/rules/ for groups that are not yet included.
# 1. Experiment if needed.
# 1. Add to the list below.
# 1. Process the old + new list.
# 1. Output this structure:
#    - In alphabetical order, comment with description for the group.
#    - In alphabetical order, the `select = [...]` line.
# ???: See if there is a way that you can eaisily test each of these groups to see how they might
#      impact existing code.
